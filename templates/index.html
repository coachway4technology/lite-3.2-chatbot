<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lite 1.2 Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dark">

<div class="chat-container">

    <h2>🤖 Lite 3.2 Chatbot 👾</h2>

    <div class="profile">
        <input id="username" placeholder="Your name">
        <select id="language">
            <option>English</option>
            <option>Tamil</option>
            <option>Hindi</option>
        </select>
        <button onclick="saveProfile()">Save</button>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <input id="search" placeholder="Search chat" oninput="searchChat()">
        <button onclick="toggleTheme()">🌙 / ☀️</button>
        <button onclick="importChat()">📥 Import</button>
        <button onclick="exportChat()">📤 Export</button>
        <button onclick="clearChat()">🗑 Clear</button>
        <button onclick="openAdmin()">🛠 Admin</button>
    </div>

    <!-- CHAT -->
    <div id="chat-box"></div>

    <!-- INPUT -->
    <div class="input-area">
        <button onclick="startVoice()">🎤</button>
        <input id="message" placeholder="Type message">
        <button onclick="sendMessage()">Send</button>
        <button onclick="rewriteLast()">✏️ Rewrite</button>
    </div>

    <div class="footer">
        Tokens used: <span id="tokens">0</span> / 1000
    </div>

    <input type="file" id="fileInput" hidden>

</div>

<script>
/* ===== ELEMENTS ===== */
const chatBox = document.getElementById("chat-box");
const messageInput = document.getElementById("message");
const tokensLabel = document.getElementById("tokens");

/* ===== STATE ===== */
let visibleChat = [];
let sessionHistory = [];
let lastUserMessage = "";
let tokensUsed = 0;
let adminUnlocked = false;

const TOKEN_LIMIT = 1000;
const ADMIN_KEY = "laksith"; // TEMP, env later

/* ===== PROFILE ===== */
function saveProfile(){
    localStorage.setItem("profile", JSON.stringify({
        name: username.value,
        language: language.value,
        theme: document.body.className
    }));
}

(function loadProfile(){
    const p = JSON.parse(localStorage.getItem("profile") || "{}");
    if(p.name) username.value = p.name;
    if(p.language) language.value = p.language;
    if(p.theme) document.body.className = p.theme;
})();

/* ===== TOKEN SYSTEM ===== */
function addTokens(text){
    const used = Math.ceil(text.length / 4);
    tokensUsed += used;
    tokensLabel.innerText = tokensUsed;

    if(tokensUsed > TOKEN_LIMIT && !adminUnlocked){
        const key = prompt("Token limit reached. Enter admin key:");
        if(key === ADMIN_KEY){
            adminUnlocked = true;
            alert("Admin access granted (+1000 tokens)");
        } else {
            endSession("Invalid admin key");
        }
    }

    if(tokensUsed > 2000){
        endSession("Token limit exceeded");
    }
}

function endSession(reason){
    alert("Session ended: " + reason);
    document.querySelectorAll("input, button").forEach(el => el.disabled = true);
}

/* ===== CHAT ===== */
function addBubble(type, text){
    const div = document.createElement("div");
    div.className = "bubble " + type;
    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    visibleChat.push({ type, text });
}

async function sendMessage(){
    const msg = messageInput.value.trim();
    if(!msg) return;

    addBubble("user", msg);
    sessionHistory.push(msg);
    lastUserMessage = msg;
    addTokens(msg);
    messageInput.value = "";

    addBubble("ai", "Typing…");

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: msg,
            language: language.value,
            memory: sessionHistory
        })
    });

    const data = await res.json();
    chatBox.lastChild.remove();
    addBubble("ai", data.reply);
    sessionHistory.push(data.reply);
    addTokens(data.reply);
}

/* ===== REWRITE ===== */
async function rewriteLast(){
    if(!lastUserMessage) return alert("No message to rewrite");

    addBubble("user", "Rewrite previous request");
    addTokens(lastUserMessage);

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: lastUserMessage,
            rewrite: true,
            language: language.value,
            memory: sessionHistory
        })
    });

    const data = await res.json();
    addBubble("ai", data.reply);
    sessionHistory.push(data.reply);
    addTokens(data.reply);
}

/* ===== SEARCH ===== */
function searchChat(){
    const q = search.value.toLowerCase();
    document.querySelectorAll(".bubble").forEach(b => {
        b.style.opacity = b.innerText.toLowerCase().includes(q) ? "1" : "0.3";
    });
}

/* ===== CLEAR ===== */
function clearChat(){
    chatBox.innerHTML = "";
    visibleChat = [];
}

/* ===== EXPORT ===== */
function exportChat(){
    const blob = new Blob([sessionHistory.join("\n\n")], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "chat.txt";
    a.click();
}

/* ===== IMPORT ===== */
function importChat(){
    fileInput.click();
}
fileInput.onchange = e => {
    const reader = new FileReader();
    reader.onload = () => {
        sessionHistory = reader.result.split("\n\n");
        clearChat();
        sessionHistory.forEach(m => addBubble("ai", m));
    };
    reader.readAsText(e.target.files[0]);
};

/* ===== THEME ===== */
function toggleTheme(){
    document.body.className = document.body.className === "dark" ? "light" : "dark";
    saveProfile();
}

/* ===== VOICE ===== */
function startVoice(){
    const rec = new webkitSpeechRecognition();
    rec.lang = "en-US";
    rec.start();
    rec.onresult = e => messageInput.value = e.results[0][0].transcript;
}

/* ===== ADMIN DEBUG ===== */
function openAdmin(){
    const key = prompt("Admin key:");
    if(key !== ADMIN_KEY) return alert("Access denied");

    alert(
        "ADMIN DEBUG PANEL\n\n" +
        "Tokens Used: " + tokensUsed + "\n" +
        "Messages Stored: " + sessionHistory.length + "\n" +
        "Admin Unlocked: " + adminUnlocked
    );
}
</script>

</body>
</html>
